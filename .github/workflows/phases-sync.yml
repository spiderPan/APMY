name: notion-phases-sync

on:
  schedule:
    - cron: "0 13 * * *" # Daily at 9am EDT / 8am EST Toronto (1pm UTC; offset from posts sync)
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

permissions:
  contents: write
  pull-requests: write

jobs:
  sync_phases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Run Phases Sync Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PHASES_DATABASE_ID: ${{ secrets.NOTION_PHASES_DATABASE_ID }}
        run: node scripts/sync-phases.js

      - name: Ensure files were generated
        id: check_changes
        run: |
          if [[ -z $(git status -s) ]]; then
            echo "No new phases to sync."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "New phase entries generated from Notion."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "phases: Import new entries from Notion"
          branch: "notion-import/phases"
          title: "Phases: Import new entries from Notion"
          body: |
            This PR contains new phase entries synced from Notion.
            Please review the content and merge.
          delete-branch: true
